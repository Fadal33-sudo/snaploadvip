<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - YT Video Downloader</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SnapLoad">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/0056b3/ffffff?text=SL">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#39FF14',
                        primaryHover: '#32CD32',
                        lightBg: '#FFFFFF',
                        darkText: '#212121',
                        brandBlue: '#0056b3',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
</head>
<body class="bg-[#FFFFFF] text-[#212121] font-sans transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Simple Header -->
    <header class="w-full py-4 px-6 absolute top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fa-solid fa-clapperboard text-brandBlue text-2xl"></i>
                <span class="text-xl md:text-2xl font-bold text-brandBlue">YT Video Downloader</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-20">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100 transition-colors duration-300 mt-12">
            
            <div id="signupNotice" class="hidden mb-6 rounded-xl border px-4 py-3 text-sm leading-relaxed"></div>

            <div class="text-center mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-black mb-2">Create an Account</h1>
                <p class="text-gray-500">Join us to start downloading videos</p>
            </div>

            <form id="signupForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Full Name</label>
                    <input type="text" id="name" class="w-full border border-gray-200 rounded-lg py-3 px-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-white text-black transition-colors" placeholder="John Doe" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email Address</label>
                    <input type="email" id="email" class="w-full border border-gray-200 rounded-lg py-3 px-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-white text-black transition-colors" placeholder="you@example.com" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-200 rounded-lg py-3 px-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary bg-white text-black transition-colors" placeholder="••••••••" required>
                </div>

                <div class="flex items-center">
                    <input id="terms" name="terms" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" required>
                    <label for="terms" class="ml-2 block text-sm text-gray-700">
                        I agree to the <a href="legal/terms.html" class="text-primary hover:text-primaryHover">Terms</a> and <a href="legal/privacy.html" class="text-primary hover:text-primaryHover">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" id="signupBtn" class="w-full bg-primary hover:bg-primaryHover text-black font-semibold text-lg py-3 rounded-lg transition-colors flex justify-center items-center">
                    <span>Sign Up</span>
                    <i id="signupSpinner" class="fa-solid fa-spinner fa-spin hidden ml-2"></i>
                </button>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-1 gap-3">
                    <button id="googleSignupBtn" class="w-full flex justify-center items-center py-2.5 border border-gray-200 rounded-lg shadow-sm bg-white text-gray-700 hover:bg-gray-50 transition-colors">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-2" alt="Google">
                        Google
                    </button>
                </div>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600">
                Already have an account? 
                <a href="login.html" class="font-medium text-primary hover:text-primaryHover">Log in</a>
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 px-6 border-t border-gray-100">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
            <div class="text-sm text-gray-500">
                &copy; 2026 YT Video Downloader. All rights reserved.
            </div>
            <div class="flex space-x-6 text-sm text-gray-500">
                <a href="legal/privacy.html" class="hover:text-primary transition-colors">Privacy Policy</a>
                <a href="legal/terms.html" class="hover:text-primary transition-colors">Terms of Service</a>
            </div>
        </div>
    </footer>

    <!-- Main JS -->
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Signup Logic ---
            const signupForm = document.getElementById('signupForm');
            const signupNotice = document.getElementById('signupNotice');
            const signupBtn = document.getElementById('signupBtn');
            const signupSpinner = document.getElementById('signupSpinner');
            const googleSignupBtn = document.getElementById('googleSignupBtn');
            const sb = window.supabaseClient || null;

            function showNotice(msg, type = 'error') {
                if (!signupNotice) return;
                signupNotice.textContent = msg;
                signupNotice.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200', 'bg-green-50', 'text-green-600', 'border-green-200');
                
                if (type === 'error') {
                    signupNotice.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
                } else {
                    signupNotice.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
                }
                signupNotice.classList.remove('hidden');
            }

            if (signupForm && sb) {
                signupForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const name = document.getElementById('name').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    const terms = document.getElementById('terms').checked;

                    // Validation
                    if (!name || !email || !password) {
                        showNotice('Fadlan buuxi dhammaan meelaha banaan.');
                        return;
                    }

                    // Email Format Check (Regex)
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(email)) {
                        showNotice('Fadlan geli cinwaan Gmail oo sax ah.');
                        return;
                    }

                    if (password.length < 6) {
                        showNotice('Furaha sirta ah (password) waa inuu ka koobnaadaa ugu yaraan 6 xaraf.');
                        return;
                    }

                    if (!terms) {
                        showNotice('Fadlan ogolaaw shuruudaha websaydhka.');
                        return;
                    }

                    // Loading UI
                    const signupBtnText = signupBtn?.querySelector('span');
                    if (signupBtnText) signupBtnText.textContent = 'Loading...';
                    signupBtn.disabled = true;
                    signupSpinner.classList.remove('hidden');
                    signupNotice.classList.add('hidden');

                    try {
                        const { data, error } = await sb.auth.signUp({
                            email,
                            password,
                            options: {
                                data: {
                                    full_name: name,
                                }
                            }
                        });

                        if (error) throw error;

                        // Success
                        showNotice('Please check your inbox to confirm your account.', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 4000);

                    } catch (error) {
                        console.error('Signup error:', error);
                        let somaliError = 'Cillad ayaa dhacday intii lagu guda jiray diiwaangelinta.';
                        
                        const errorMsg = error.message.toLowerCase();
                        if (errorMsg.includes('already registered') || errorMsg.includes('already in use')) {
                            somaliError = 'Gmail-kan horay ayaa loogu diwaangeliyey ama ma jiro.';
                        } else if (errorMsg.includes('password should be')) {
                            somaliError = 'Furaha sirta ah waa mid daciif ah (ugu yaraan 6 xaraf).';
                        } else if (errorMsg.includes('invalid email')) {
                            somaliError = 'Fadlan geli cinwaan Gmail oo sax ah.';
                        }
                        
                        showNotice(somaliError);
                        if (signupBtnText) signupBtnText.textContent = 'Sign Up';
                        signupBtn.disabled = false;
                        signupSpinner.classList.add('hidden');
                    }
                });
            }

            // Google Signup
            if (googleSignupBtn && sb) {
                googleSignupBtn.addEventListener('click', async () => {
                    try {
                        const { error } = await sb.auth.signInWithOAuth({
                            provider: 'google',
                            options: {
                                redirectTo: window.location.origin + '/index.html'
                            }
                        });
                        if (error) throw error;
                    } catch (error) {
                        console.error('OAuth error:', error);
                        showNotice('Failed to start Google signup.');
                    }
                });
            }
        });
    </script>
</body>
</html>
