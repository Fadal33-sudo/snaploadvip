<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - YT Video Downloader</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SnapLoad">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/0056b3/ffffff?text=SL">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0056b3',
                        primaryHover: '#004494',
                        darkBg: '#0f0f0f',
                        neonBlue: '#00d2ff',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body class="bg-gray-50 text-black dark:bg-darkBg dark:text-white font-sans transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Simple Header -->
    <header class="w-full py-4 px-6 absolute top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fa-solid fa-clapperboard text-primary dark:text-neonBlue text-2xl"></i>
                <span class="text-xl md:text-2xl font-bold text-primary dark:text-white">YT Video Downloader</span>
            </a>
            <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block text-neonBlue"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-20">
        <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-2xl shadow-xl dark:shadow-neonBlue/10 p-8 border border-gray-100 dark:border-gray-800 transition-colors duration-300 mt-12">
            
            <div id="signupNotice" class="hidden mb-6 rounded-xl border px-4 py-3 text-sm leading-relaxed"></div>

            <div class="text-center mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-black dark:text-white mb-2">Create an Account</h1>
                <p class="text-gray-500 dark:text-gray-400">Join us to start downloading videos</p>
            </div>

            <form id="signupForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="name">Full Name</label>
                    <input type="text" id="name" class="w-full border border-gray-300 dark:border-gray-700 rounded-lg py-3 px-4 focus:outline-none focus:border-primary dark:focus:border-neonBlue focus:ring-1 focus:ring-primary dark:focus:ring-neonBlue dark:bg-gray-800 dark:text-white transition-colors" placeholder="John Doe" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="email">Email Address</label>
                    <input type="email" id="email" class="w-full border border-gray-300 dark:border-gray-700 rounded-lg py-3 px-4 focus:outline-none focus:border-primary dark:focus:border-neonBlue focus:ring-1 focus:ring-primary dark:focus:ring-neonBlue dark:bg-gray-800 dark:text-white transition-colors" placeholder="you@example.com" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="password">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 dark:border-gray-700 rounded-lg py-3 px-4 focus:outline-none focus:border-primary dark:focus:border-neonBlue focus:ring-1 focus:ring-primary dark:focus:ring-neonBlue dark:bg-gray-800 dark:text-white transition-colors" placeholder="••••••••" required>
                </div>

                <div class="flex items-center">
                    <input id="terms" name="terms" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded dark:bg-gray-800 dark:border-gray-700" required>
                    <label for="terms" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
                        I agree to the <a href="legal/terms.html" class="text-primary hover:text-primaryHover dark:text-neonBlue dark:hover:text-blue-400">Terms</a> and <a href="legal/privacy.html" class="text-primary hover:text-primaryHover dark:text-neonBlue dark:hover:text-blue-400">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" id="signupBtn" class="w-full bg-primary hover:bg-primaryHover text-white font-semibold text-lg py-3 rounded-lg transition-colors flex justify-center items-center">
                    <span>Sign Up</span>
                    <i id="signupSpinner" class="fa-solid fa-spinner fa-spin hidden ml-2"></i>
                </button>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300 dark:border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-gray-900 text-gray-500">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-3">
                    <button class="w-full flex justify-center items-center py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg shadow-sm bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <i class="fa-brands fa-google text-red-500 mr-2"></i>
                        Google
                    </button>
                    <button class="w-full flex justify-center items-center py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg shadow-sm bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <i class="fa-brands fa-github text-gray-900 dark:text-white mr-2"></i>
                        GitHub
                    </button>
                </div>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
                Already have an account? 
                <a href="login.html" class="font-medium text-primary hover:text-primaryHover dark:text-neonBlue dark:hover:text-blue-400">Log in</a>
            </p>
        </div>
    </main>

    <!-- Main JS -->
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            // ... (rest of the theme logic will be handled by main.js, but let's keep it here for simplicity)

            // --- Signup Logic ---
            const signupForm = document.getElementById('signupForm');
            const signupNotice = document.getElementById('signupNotice');
            const signupBtn = document.getElementById('signupBtn');
            const signupSpinner = document.getElementById('signupSpinner');
            const sb = window.supabaseClient || null;

            // Initialize EmailJS with the key from CONFIG if available
            if (window.emailjs && window.CONFIG && window.CONFIG.EMAILJS_PUBLIC_KEY) {
                emailjs.init(window.CONFIG.EMAILJS_PUBLIC_KEY);
                console.log('EmailJS initialized for signup');
            }

            async function sendWelcomeEmail(userEmail, userName) {
                if (!window.emailjs || !window.CONFIG) return;
                
                const templateParams = {
                    to_email: userEmail,
                    user_name: userName,
                    subject: 'Welcome to SnapLoad!',
                    message: 'Welcome to SnapLoad! Your account has been successfully created. You can now log in and start downloading your favorite videos in 4K quality.'
                };

                try {
                    await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, templateParams);
                    console.log('Welcome email sent successfully');
                } catch (error) {
                    console.error('Failed to send welcome email:', error);
                }
            }

            function showNotice(msg, type = 'error') {
                if (!signupNotice) return;
                signupNotice.textContent = msg;
                signupNotice.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200', 'bg-green-50', 'text-green-600', 'border-green-200');
                
                if (type === 'error') {
                    signupNotice.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
                } else {
                    signupNotice.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
                }
            }

            if (signupForm && sb) {
                signupForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const name = document.getElementById('name').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    const terms = document.getElementById('terms').checked;

                    // Validation
                    if (!name || !email || !password) {
                        showNotice('Please fill in all fields.');
                        return;
                    }

                    // Email Format Check (Regex)
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(email)) {
                        showNotice('Please enter a valid email address.');
                        return;
                    }

                    if (password.length < 6) {
                        showNotice('Password must be at least 6 characters long.');
                        return;
                    }

                    if (!terms) {
                        showNotice('Please agree to the Terms and Conditions.');
                        return;
                    }

                    // Loading UI
                    const signupBtnText = signupBtn?.querySelector('span');
                    if (signupBtnText) signupBtnText.textContent = 'Loading...';
                    signupBtn.disabled = true;
                    signupSpinner.classList.remove('hidden');
                    signupNotice.classList.add('hidden');

                    try {
                        const { data, error } = await sb.auth.signUp({
                            email,
                            password,
                            options: {
                                data: {
                                    full_name: name,
                                }
                            }
                        });

                        if (error) throw error;

                        // Send welcome email before redirecting
                        await sendWelcomeEmail(email, name);

                        // Success
                        showNotice('Your account has been created! Please check your inbox to confirm your account. Redirecting...', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'success.html';
                        }, 3000);

                    } catch (error) {
                        console.error('Signup error:', error);
                        let errorMsgText = 'An error occurred during registration.';
                        
                        const errorMsg = error.message.toLowerCase();
                        if (errorMsg.includes('already registered') || errorMsg.includes('already in use')) {
                            errorMsgText = 'This email is already registered or invalid.';
                        } else if (errorMsg.includes('password should be')) {
                            errorMsgText = 'Password is too weak (minimum 6 characters).';
                        } else if (errorMsg.includes('invalid email')) {
                            errorMsgText = 'Please enter a valid email address.';
                        } else if (errorMsg.includes('rate limit')) {
                            errorMsgText = 'Please wait a moment, too many registration attempts.';
                        }
                        
                        showNotice(errorMsgText);
                        if (signupBtnText) signupBtnText.textContent = 'Sign Up';
                        signupBtn.disabled = false;
                        signupSpinner.classList.add('hidden');
                    }
                });
            } else if (!sb) {
                console.error('Supabase client not found');
            }
        });
    </script>
</body>
</html>
