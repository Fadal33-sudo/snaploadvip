<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - YT Video Downloader</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0056b3',
                        primaryHover: '#004494',
                        darkBg: '#0f0f0f',
                        neonBlue: '#00d2ff',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
</head>
<body class="bg-gray-50 text-black dark:bg-darkBg dark:text-white font-sans transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Simple Header -->
    <header class="w-full py-4 px-6 absolute top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fa-solid fa-clapperboard text-primary dark:text-neonBlue text-2xl"></i>
                <span class="text-xl md:text-2xl font-bold text-primary dark:text-white">YT Video Downloader</span>
            </a>
            <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block text-neonBlue"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-20">
        <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-2xl shadow-xl dark:shadow-neonBlue/10 p-8 border border-gray-100 dark:border-gray-800 transition-colors duration-300 mt-12">
            <div id="loginNotice" class="hidden mb-6 rounded-xl border border-primary/20 bg-primary/5 text-primary dark:border-neonBlue/25 dark:bg-neonBlue/10 dark:text-neonBlue px-4 py-3 text-sm leading-relaxed"></div>
            
            <div class="text-center mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-black dark:text-white mb-2">Welcome Back</h1>
                <p class="text-gray-500 dark:text-gray-400">Log in to your account to continue</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="email">Email Address</label>
                    <input type="email" id="email" class="w-full border border-gray-300 dark:border-gray-700 rounded-lg py-3 px-4 focus:outline-none focus:border-primary dark:focus:border-neonBlue focus:ring-1 focus:ring-primary dark:focus:ring-neonBlue dark:bg-gray-800 dark:text-white transition-colors" placeholder="you@example.com" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="password">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 dark:border-gray-700 rounded-lg py-3 px-4 focus:outline-none focus:border-primary dark:focus:border-neonBlue focus:ring-1 focus:ring-primary dark:focus:ring-neonBlue dark:bg-gray-800 dark:text-white transition-colors" placeholder="••••••••" required>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded dark:bg-gray-800 dark:border-gray-700">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Remember me</label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-primary hover:text-primaryHover dark:text-neonBlue dark:hover:text-blue-400">Forgot password?</a>
                    </div>
                </div>

                <button id="loginBtn" type="submit" class="w-full bg-primary hover:bg-primaryHover text-white font-semibold text-lg py-3 rounded-lg transition-colors flex justify-center items-center">
                    <span>Log In</span>
                    <i id="loginSpinner" class="fa-solid fa-spinner fa-spin hidden ml-2"></i>
                </button>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300 dark:border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-gray-900 text-gray-500">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-3">
                    <button id="googleLoginBtn" type="button" class="w-full flex justify-center items-center py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg shadow-sm bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <i class="fa-brands fa-google text-red-500 mr-2"></i>
                        Google
                    </button>
                    <button id="githubLoginBtn" type="button" class="w-full flex justify-center items-center py-2.5 border border-gray-300 dark:border-gray-700 rounded-lg shadow-sm bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <i class="fa-brands fa-github text-gray-900 dark:text-white mr-2"></i>
                        GitHub
                    </button>
                </div>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
                Don't have an account? 
                <a href="signup.html" class="font-medium text-primary hover:text-primaryHover dark:text-neonBlue dark:hover:text-blue-400">Sign up</a>
            </p>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginNotice = document.getElementById('loginNotice');
            const noticeText = sessionStorage.getItem('ytvd_login_notice');
            if (loginNotice && noticeText) {
                loginNotice.textContent = noticeText;
                loginNotice.classList.remove('hidden');
            }

            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const loginSpinner = document.getElementById('loginSpinner');
            const googleLoginBtn = document.getElementById('googleLoginBtn');
            const githubLoginBtn = document.getElementById('githubLoginBtn');

            const pendingPlan = sessionStorage.getItem('ytvd_pending_plan');
            const redirectTo = sessionStorage.getItem('ytvd_post_login_redirect') || 'index.html';

            function showNotice(msg, type = 'error') {
                if (!loginNotice) return;
                loginNotice.textContent = msg;
                loginNotice.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200', 'bg-green-50', 'text-green-600', 'border-green-200');
                if (type === 'error') {
                    loginNotice.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
                } else {
                    loginNotice.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
                }
            }

            function completeLogin(user) {
                if (window.YTVD_AUTH?.setAuthUser) {
                    window.YTVD_AUTH.setAuthUser(user);
                } else {
                    localStorage.setItem('ytvd_auth_user', JSON.stringify(user));
                }

                if (pendingPlan === 'free') {
                    localStorage.setItem('ytvd_plan', 'free');
                    localStorage.setItem('ytvd_free_active', '1');
                    sessionStorage.setItem('ytvd_show_free_notice', '1');
                }

                sessionStorage.removeItem('ytvd_login_notice');
                sessionStorage.removeItem('ytvd_pending_plan');
                sessionStorage.removeItem('ytvd_post_login_redirect');
                window.location.href = redirectTo;
            }

            const sb = window.supabaseClient || null;

            if (sb) {
                sb.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' && session?.user) {
                        const user = session.user;
                        completeLogin({
                            uid: user.id,
                            email: user.email || '',
                            name: user.user_metadata?.full_name || user.user_metadata?.name || '',
                            provider: user.app_metadata?.provider || 'supabase',
                        });
                    }
                });

                sb.auth.getSession().then(({ data }) => {
                    if (data?.session?.user) {
                        const user = data.session.user;
                        completeLogin({
                            uid: user.id,
                            email: user.email || '',
                            name: user.user_metadata?.full_name || user.user_metadata?.name || '',
                            provider: user.app_metadata?.provider || 'supabase',
                        });
                    }
                }).catch(() => {});
            }

            if (loginForm && emailInput && passwordInput) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    console.log("Login attempt started");
                    
                    const email = String(emailInput.value || '').trim();
                    const password = String(passwordInput.value || '');

                    // Validation
                    if (!email || !password) {
                        showNotice('Please enter your email and password.');
                        return;
                    }

                    // Email Regex check
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(email)) {
                        showNotice('Please enter a valid email address.');
                        return;
                    }

                    if (!sb) {
                        showNotice('Supabase client not found. Please ensure supabaseClient.js is loaded correctly.');
                        return;
                    }

                    // Loading UI
                    const loginBtnText = loginBtn?.querySelector('span');
                    if (loginBtnText) loginBtnText.textContent = 'Loading...';
                    if (loginSpinner) loginSpinner.classList.remove('hidden');
                    if (loginBtn) loginBtn.disabled = true;

                    try {
                        const { data, error } = await sb.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        
                        if (data?.user) {
                            completeLogin({
                                uid: data.user.id,
                                email: data.user.email || email,
                                name: data.user.user_metadata?.full_name || data.user.user_metadata?.name || '',
                                provider: data.user.app_metadata?.provider || 'supabase',
                            });
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        let errorMsgText = 'An error occurred during login.';
                        
                        const errorMsg = error.message.toLowerCase();
                        if (errorMsg.includes('invalid login credentials')) {
                            errorMsgText = 'Invalid email or password.';
                        } else if (errorMsg.includes('email not confirmed')) {
                            errorMsgText = 'Please confirm your email (check your inbox for the confirmation link).';
                        } else if (errorMsg.includes('invalid email')) {
                            errorMsgText = 'Please enter a valid email address.';
                        } else if (errorMsg.includes('rate limit')) {
                            errorMsgText = 'Please wait a moment, too many login attempts.';
                        }
                        
                        showNotice(errorMsgText);
                        
                        // Reset UI
                        if (loginBtnText) loginBtnText.textContent = 'Log In';
                        if (loginSpinner) loginSpinner.classList.add('hidden');
                        if (loginBtn) loginBtn.disabled = false;
                    }
                });
            }

            if (googleLoginBtn) {
                googleLoginBtn.addEventListener('click', async () => {
                    if (sb) {
                        try {
                            if (window.location.origin === 'null') {
                                if (loginNotice) {
                                    loginNotice.textContent = 'Google login requires a website (http/https). Please open on localhost or a domain.';
                                    loginNotice.classList.remove('hidden');
                                }
                                return;
                            }

                            const redirectUrl = new URL('login.html', window.location.origin).toString();

                            await sb.auth.signInWithOAuth({
                                provider: 'google',
                                options: { redirectTo: redirectUrl },
                            });
                            return;
                        } catch {
                        }
                    }

                    if (loginNotice) {
                        loginNotice.textContent = 'Supabase is not connected. Please enter SUPABASE_URL and SUPABASE_ANON_KEY.';
                        loginNotice.classList.remove('hidden');
                    }
                });
            }

            if (githubLoginBtn) {
                githubLoginBtn.addEventListener('click', async () => {
                    if (sb) {
                        try {
                            if (window.location.origin === 'null') {
                                if (loginNotice) {
                                    loginNotice.textContent = 'OAuth login requires a website (http/https). Please open on localhost or a domain.';
                                    loginNotice.classList.remove('hidden');
                                }
                                return;
                            }

                            const redirectUrl = new URL('login.html', window.location.origin).toString();

                            await sb.auth.signInWithOAuth({
                                provider: 'github',
                                options: { redirectTo: redirectUrl },
                            });
                            return;
                        } catch {
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
