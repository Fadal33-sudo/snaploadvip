<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - YT Video Downloader</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SnapLoad">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/0056b3/ffffff?text=SL">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#39FF14',
                        primaryHover: '#32CD32',
                        lightBg: '#FFFFFF',
                        darkText: '#212121',
                        brandBlue: '#0056b3',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
</head>
<body class="bg-[#FFFFFF] text-[#212121] font-sans transition-colors duration-300 min-h-screen flex flex-col">

    <!-- Simple Header -->
    <header class="w-full py-4 px-6 absolute top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fa-solid fa-clapperboard text-brandBlue text-2xl"></i>
                <span class="text-xl md:text-2xl font-bold text-brandBlue">YT Video Downloader</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-20">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100 transition-colors duration-300 mt-12">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-black mb-2">Welcome Back</h1>
                <p class="text-gray-600">Log in to manage your downloads and VIP features.</p>
            </div>

            <!-- Login Notice -->
            <div id="loginNotice" class="hidden mb-6 p-4 rounded-lg bg-blue-50 text-blue-600 border border-blue-200 text-sm font-medium"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" placeholder="name@gmail.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all bg-white text-black" required>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                        <a href="#" class="text-xs font-medium text-primary hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all bg-white text-black" required>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-primary hover:bg-primaryHover text-black font-bold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all flex justify-center items-center gap-2">
                    <span id="loginBtnText">Log In</span>
                    <i id="loginSpinner" class="fa-solid fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <div class="mt-6">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="border-t border-gray-200 w-full"></div>
                    <span class="bg-white px-4 text-xs text-gray-400 uppercase tracking-widest absolute">Or continue with</span>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button id="googleLoginBtn" class="flex items-center justify-center gap-3 w-full py-3 px-4 rounded-xl border border-gray-200 hover:bg-gray-50 transition-colors font-medium text-gray-700">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                        Google
                    </button>
                </div>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600">
                Don't have an account? 
                <a href="signup.html" class="font-medium text-primary hover:text-primaryHover">Sign up</a>
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 px-6 border-t border-gray-100">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
            <div class="text-sm text-gray-500">
                &copy; 2026 YT Video Downloader. All rights reserved.
            </div>
            <div class="flex space-x-6 text-sm text-gray-500">
                <a href="legal/privacy.html" class="hover:text-primary transition-colors">Privacy Policy</a>
                <a href="legal/terms.html" class="hover:text-primary transition-colors">Terms of Service</a>
            </div>
        </div>
    </footer>

    <!-- Main JS -->
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const loginNotice = document.getElementById('loginNotice');
            const loginBtn = document.getElementById('loginBtn');
            const loginSpinner = document.getElementById('loginSpinner');
            const sb = window.supabaseClient || null;

            // Check for post-login redirect
            const redirectUrl = sessionStorage.getItem('ytvd_post_login_redirect') || 'index.html';
            const noticeMsg = sessionStorage.getItem('ytvd_login_notice');
            
            if (noticeMsg) {
                if (loginNotice) {
                    loginNotice.textContent = noticeMsg;
                    loginNotice.classList.remove('hidden');
                }
                sessionStorage.removeItem('ytvd_login_notice');
            }

            function showNotice(msg, type = 'error') {
                if (!loginNotice) return;
                loginNotice.textContent = msg;
                loginNotice.classList.remove('hidden', 'bg-blue-50', 'text-blue-600', 'border-blue-200', 'bg-red-50', 'text-red-600', 'border-red-200');
                
                if (type === 'error') {
                    loginNotice.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
                } else {
                    loginNotice.classList.add('bg-blue-50', 'text-blue-600', 'border-blue-200');
                }
            }

            async function completeLogin(userData) {
                // If we came from a specific plan purchase
                const pendingPlan = sessionStorage.getItem('ytvd_pending_plan');
                if (pendingPlan === 'free') {
                    localStorage.setItem('ytvd_free_active', '1');
                    sessionStorage.removeItem('ytvd_pending_plan');
                }
                
                window.location.href = redirectUrl;
            }

            if (loginForm && sb) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;

                    // Validation
                    if (!email || !password) {
                        showNotice('Please enter your email and password.');
                        return;
                    }

                    // Email Regex check
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(email)) {
                        showNotice('Please enter a valid email address.');
                        return;
                    }

                    if (!sb) {
                        showNotice('Supabase client not found. Please ensure supabaseClient.js is loaded correctly.');
                        return;
                    }

                    // Loading UI
                    loginBtn.disabled = true;
                    loginSpinner.classList.remove('hidden');
                    loginNotice.classList.add('hidden');

                    try {
                        const { data, error } = await sb.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        
                        if (data?.user) {
                            completeLogin({
                                uid: data.user.id,
                                email: data.user.email || email,
                                name: data.user.user_metadata?.full_name || data.user.user_metadata?.name || '',
                                provider: data.user.app_metadata?.provider || 'supabase',
                            });
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        let errorMsgText = 'An error occurred during login.';
                        
                        const errorMsg = error.message.toLowerCase();
                        if (errorMsg.includes('invalid login credentials')) {
                            errorMsgText = 'Invalid email or password.';
                        } else if (errorMsg.includes('email not confirmed')) {
                            errorMsgText = 'Please confirm your email (check your inbox for the confirmation link).';
                        } else if (errorMsg.includes('invalid email')) {
                            errorMsgText = 'Please enter a valid email address.';
                        } else if (errorMsg.includes('rate limit')) {
                            errorMsgText = 'Please wait a moment, too many login attempts.';
                        }
                        
                        showNotice(errorMsgText);
                        loginBtn.disabled = false;
                        loginSpinner.classList.add('hidden');
                    }
                });
            }

            // Google Login
            const googleBtn = document.getElementById('googleLoginBtn');
            if (googleBtn && sb) {
                googleBtn.addEventListener('click', async () => {
                    try {
                        // Check if we are on a proper origin (OAuth requirement)
                        if (window.location.origin === 'null') {
                            if (loginNotice) {
                                loginNotice.textContent = 'Google login requires a website (http/https). Please open on localhost or a domain.';
                                loginNotice.classList.remove('hidden');
                            }
                            return;
                        }

                        const { error } = await sb.auth.signInWithOAuth({
                            provider: 'google',
                            options: {
                                redirectTo: window.location.origin + '/' + redirectUrl
                            }
                        });
                        if (error) throw error;
                    } catch (error) {
                        console.error('OAuth error:', error);
                        showNotice('Failed to start Google login.');
                    }
                });
            } else if (!sb) {
                if (loginNotice) {
                    loginNotice.textContent = 'Supabase is not connected. Please enter SUPABASE_URL and SUPABASE_ANON_KEY.';
                    loginNotice.classList.remove('hidden');
                }
            }
        });
    </script>
</body>
</html>
